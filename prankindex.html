<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #eef3f8, #f9fbfd);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }.box {
  text-align: center;
  background: white;
  padding: 35px 25px;
  border-radius: 16px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  width: 90%;
  max-width: 420px;
  transition: transform 0.2s ease;
}

.box:hover {
  transform: translateY(-3px);
}

.logo {
  font-size: 28px;
  font-weight: 700;
  color: #0a66c2;
  margin-bottom: 20px;
}

.emoji {
  font-size: 28px;
}

.code {
  font-size: 64px;
  color: #222;
  font-weight: 600;
}

.title {
  font-size: 20px;
  margin-top: 10px;
  color: #333;
  font-weight: 500;
}

.desc {
  font-size: 14px;
  color: #666;
  margin-top: 10px;
  line-height: 1.5;
}

.status {
  margin-top: 15px;
  font-size: 14px;
  color: #0a66c2;
  font-weight: 500;
}

.dots::after {
  content: '';
  animation: dots 1.5s steps(3, end) infinite;
}

@keyframes dots {
  0% { content: ''; }
  33% { content: '.'; }
  66% { content: '..'; }
  100% { content: '...'; }
}

.prank {
  display: none;
}

.prank h1 {
  font-size: 32px;
  color: #0a66c2;
}

.btn {
  margin-top: 20px;
  padding: 10px 20px;
  background: #0a66c2;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-weight: 500;
  transition: 0.2s;
}

.btn:hover {
  background: #004182;
  transform: scale(1.05);
}

footer {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: #777;
}

audio { display: none; }


@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

  </style>
</head>
<body>  <div class="box" id="errorBox">
    <div class="logo">LinkedIn</div>
    <div class="emoji">😢</div>
    <div class="code">500</div>
    <div class="title">Something went wrong</div>
    <div class="desc">
      We're having trouble loading this page. Please check your connection or try again later.
    </div>
    <div class="status">Reconnecting<span class="dots"></span>
    <div style="margin-top:10px;">
      <button class="btn" onclick="showPrank()" style="padding:6px 14px; font-size:13px; border-radius:6px;">Retry</button>
    </div></div>
  </div>  <div class="box prank" id="prankBox">
    <h1>😂 April Fool!</h1>
    <img src="https://i.pinimg.com/originals/2f/b0/cb/2fb0cb58d2bf8f72abfa7c8431c95930.gif" alt="teddy" style="width:140px; margin:10px auto; display:block;">
    <p style="font-size:16px; color:#555;">
      Okay okay 😅 prank tha...<br>
      But tum smile karo to zyada achha lagta hai 😊
    </p>
    <button class="btn" onclick="reloadPage()">Once More 😄</button>
  </div>  <footer>LinkedIn © 2026</footer><audio id="sound" src="https://www.myinstants.com/media/sounds/trollolol.mp3"></audio>

  <script>
    setTimeout(() => {
      showPrank();
    }, 5000);

    function showPrank() {
      document.getElementById('errorBox').style.display = 'none';
      document.getElementById('prankBox').style.display = 'block';

      let audio = document.getElementById('sound');
      audio.volume = 0.4;
      audio.play().catch(() => {});
    }

    function reloadPage() {
      location.reload();
    }
  </script></body>
</html>
